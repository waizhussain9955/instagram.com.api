name: Scraper CI

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/scraper/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/scraper/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: 'apps/scraper/requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/scraper/requirements.txt

    - name: Python Syntax Compile Check
      run: python -m compileall apps/scraper
