name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, pdo, pdo_pgsql

    - name: Validate composer.json and composer.lock
      run: composer validate --working-dir=apps/backend

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: apps/backend/vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install Dependencies
      run: composer install --prefer-dist --no-progress --no-suggest --working-dir=apps/backend

    - name: Run Syntax Lint Check
      run: find apps/backend/app apps/backend/routes apps/backend/config -name "*.php" -exec php -l {} \;
