# fly.backend.toml
# Deploy using: fly deploy -c fly.backend.toml

app = "instagram-laravel-api"
primary_region = "ewr"

[build]
  dockerfile = "apps/backend/Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
