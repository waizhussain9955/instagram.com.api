version: '3.8'

services:
  # Next.js Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/nextjs.dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always
    depends_on:
      - backend

  # Laravel API Backend
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/laravel.dockerfile
    volumes:
      - ../backend:/var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    restart: always
    depends_on:
      - redis

  # Python FastAPI Scraper
  scraper:
    build:
      context: ../scraper
      dockerfile: ../scraper/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DEBUG=false
    restart: always
    depends_on:
      - redis

  # Redis Cache & Queue
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  # Nginx Gateway
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../backend:/var/www/html
    depends_on:
      - frontend
      - backend
      - scraper
    restart: always
